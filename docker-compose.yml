name: sanba

services:
  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
        NEXT_PUBLIC_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-30}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    env_file: .env.local
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8080}
    ports: ["3000:3000"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env.local
    environment:
      LIVEKIT_SERVER_URL: ${API_LIVEKIT_URL:-ws://livekit:7880}
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/adc.json
    volumes:
      - ${SANBA_ADC_FILE:-/dev/null}:/gcp/adc.json:ro
    ports: ["8080:8080"]
    depends_on:
      livekit:
        condition: service_started
      firestore:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
      args:
        DOWNLOAD_MODELS: "0"
    env_file: .env.local
    environment:
      LIVEKIT_URL: ${AGENT_LIVEKIT_URL:-ws://livekit:7880}
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/adc.json
    volumes:
      - ${SANBA_ADC_FILE:-/dev/null}:/gcp/adc.json:ro
      - agent-cache:/home/appuser/.cache
    command: ["start"]
    depends_on:
      livekit:
        condition: service_started
      firestore:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:v1.13.3
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "devkey: secret"
    restart: unless-stopped

  firestore:
    image: google/cloud-sdk:575.0.1-emulators
    command: >
      gcloud emulators firestore start
      --host-port=0.0.0.0:8200 --project=${GOOGLE_CLOUD_PROJECT:-sanba-dev}
    ports: ["8200:8200"]
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports: ["9200:9200"]
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

volumes:
  es-data:
  agent-cache:
