# SANBA — アプリケーション必須スタック (local development)
#
# このファイルだけで「つくる」アプリ一式が動く:
#   web (Next.js) ─→ api (FastAPI) ─→ livekit / firestore
#   agent (LiveKit worker) ─→ livekit / firestore / elasticsearch
#
# 可観測性・LLMOps・DORA など「必須ではないが あったら便利」なコンポーネントは
# docker-compose.tools.yml に分離している (overlay として重ねて起動する)。
#
#   just up          # このファイルだけ (アプリ最小構成)
#   just up-full     # docker-compose.tools.yml を重ねて全部入り
#
# Rancher Desktop (dockerd / moby) を想定。`docker compose` が CLI として使えること。
name: sanba

services:
  # ============================ Application ============================
  web:
    build:
      context: ./apps/web
      args:
        # NEXT_PUBLIC_* は Next.js のビルド時にバンドルへ焼き込まれる。
        # ブラウザから見たエンドポイントなので localhost を既定にする。
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
        NEXT_PUBLIC_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-30}
        # 空なら web は dev モード (Google ログインを出さず bypass で進む / ADR-0012)。
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    env_file: .env.local
    ports: ["3000:3000"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # node:slim には curl が無いので node 組み込みの fetch で確認する。
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env.local
    ports: ["8080:8080"]
    # api はセッション/要件のリーダー兼ライターになった (ADR-0014 §15)。
    # 接続先は .env.local の FIRESTORE_EMULATOR_HOST で切り替わる。
    depends_on:
      livekit:
        condition: service_started
      firestore:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # python:slim には curl が無いので標準ライブラリで /healthz を叩く。
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    env_file: .env.local
    environment:
      # agent は LiveKit worker として server に接続する。コンテナ内から localhost は
      # 自分自身を指すため、.env.local の ws://localhost:7880 では届かない。docker の
      # サービス名をデフォルトとし、.env.local で AGENT_LIVEKIT_URL を指定すれば
      # LiveKit Cloud 等の別ホストへ向けられる (api/web が返す URL はブラウザ向けの localhost のまま)。
      LIVEKIT_URL: ${AGENT_LIVEKIT_URL:-ws://livekit:7880}
    command: ["start"]
    depends_on:
      livekit:
        condition: service_started
      firestore:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ============================ Realtime media ============================
  livekit:
    image: livekit/livekit-server:latest
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      # --dev は devkey/secret を有効化する。.env.local の LIVEKIT_API_KEY/SECRET と一致させる。
      LIVEKIT_KEYS: "devkey: secret"
    restart: unless-stopped

  # ============================ State (Firestore emulator) ============================
  firestore:
    image: google/cloud-sdk:emulators
    command: >
      gcloud emulators firestore start
      --host-port=0.0.0.0:8200 --project=${GOOGLE_CLOUD_PROJECT:-sanba-dev}
    ports: ["8200:8200"]
    restart: unless-stopped

  # ============================ Search / RAG grounding ============================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports: ["9200:9200"]
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

volumes:
  es-data:
