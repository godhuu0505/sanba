[project]
name = "sanba-shared"
version = "0.1.0"
description = "SANBA shared domain models and persistence (sessions, utterances, requirements)"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "google-cloud-firestore>=2.16.0",
    "structlog>=24.1",
    # grounding 索引（Elasticsearch）とマルチモーダル解析（Gemini）を api/worker で共有する
    # （grounding.py / media.py。ADR-0040）。api/agent は既にこれらに依存している。
    "elasticsearch>=8.14,<10",
    "google-genai>=1.0.0",
    # 解析結果の realtime publish（realtime.py。api/worker 共有）。送信は遅延 import なので
    # import 時には不要だが、実送信のため依存に含める。
    "livekit-api>=0.7",
]

[dependency-groups]
dev = [
    "pytest>=8.2",
    "ruff>=0.5",
    "mypy>=1.10",
]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sanba_shared"]
