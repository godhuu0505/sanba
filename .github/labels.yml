# ラベルの単一の真実（IaC）。
# main への push（このファイル変更時）で crazy-max/ghaction-github-labeler が同期する。
# .github/workflows/labels.yml 参照。手動で gh label edit せず、必ずこのファイルを編集すること。
#
# 軸（dimension）= 1 接頭辞。1 issue/PR に各軸 0〜1 個を付ける運用:
#   type:*      何の変更か（種別）
#   priority:*  優先度（温度グラデ 赤→黄）
#   area:*      対象コンポーネント（青系。labeler.yml で path 自動付与）
#   status:*    進行状態
#   ai:*        自動化制御（ADR-0015）
#   （接頭辞なし）メタ / dependabot 管理
#
# rename は from-name で行う（既存 issue/PR の付与を保持したまま改名される）。
# 運用ガイド: docs/how-to/labels.md

# ── type: 種別 ───────────────────────────────────────────────
- name: "type:bug"
  color: "d73a4a"
  description: "不具合・期待と異なる挙動"
  from-name: "bug"
- name: "type:feature"
  color: "a2eeef"
  description: "新機能・改善"
  from-name: "enhancement"
- name: "type:docs"
  color: "0075ca"
  description: "ドキュメント・ADR"
  from-name: "documentation"
- name: "type:refactor"
  color: "d4c5f9"
  description: "挙動を変えない内部改善"
- name: "type:security"
  color: "ee0701"
  description: "セキュリティ対応・脆弱性修正"
- name: "type:infra"
  color: "bfd4f2"
  description: "Terraform / Cloud Run / CI-CD など基盤"
- name: "type:test"
  color: "bfdadc"
  description: "テスト追加・修正"
- name: "type:chore"
  color: "ededed"
  description: "雑務・設定・依存整理など"
- name: "type:ci"
  color: "c5def5"
  description: "CI/CD ワークフローの変更"
  from-name: "ci"

# ── priority: 優先度（温度グラデ） ──────────────────────────
- name: "priority:p0"
  color: "b60205"
  description: "最優先・ブロッカー"
  from-name: "P0"
- name: "priority:p1"
  color: "d93f0b"
  description: "高"
  from-name: "P1"
- name: "priority:p2"
  color: "fbca04"
  description: "中"
  from-name: "P2"
- name: "priority:p3"
  color: "fef2c0"
  description: "低・余力があれば"

# ── area: 対象コンポーネント（青系・path で自動付与） ───────
- name: "area:agent"
  color: "0366d6"
  description: "apps/agent（LiveKit worker / ADK）"
  from-name: "track:agent"
- name: "area:api"
  color: "1d76db"
  description: "apps/api（FastAPI）"
  from-name: "track:api"
- name: "area:web"
  color: "2188ff"
  description: "apps/web（Next.js）"
  from-name: "track:web"
- name: "area:infra"
  color: "79b8ff"
  description: "infra / .github（Terraform・CI/CD）"
- name: "area:docs"
  color: "c5def5"
  description: "docs / Markdown"

# ── status: 進行状態 ─────────────────────────────────────────
- name: "status:ready"
  color: "0e8a16"
  description: "前提なし・即着手可"
  from-name: "ready"
- name: "status:in-progress"
  color: "fbca04"
  description: "対応中"
- name: "status:blocked"
  color: "6e7781"
  description: "前提タスク未完で着手不可"
  from-name: "blocked"
# needs-human は ADR-0015 §6 が定める自動化コントラクト名。
# 文字列一致で参照されるため接頭辞を付けず、この正確な綴りを維持する（rename 禁止）。
- name: "needs-human"
  color: "d93f0b"
  description: "AI が自走を止めた。人間の判断/対応が必要（ADR-0015 §6）"

# ── ai: 自動化制御（ADR-0015。文字列一致で参照、rename 禁止） ─
- name: "ai:build"
  color: "1d76db"
  description: "issue に付与で Claude セッションが起動し実装→PR→babysitter（ADR-0015 §1）"
- name: "ai:babysitting"
  color: "0e8a16"
  description: "babysitter が自走中の PR に付く可視化用（ADR-0015 §1,§3）"
# review-wait / review-responding はレビュー進行の可視化用。ワークフローが文字列一致で
# 付け外しするため rename 禁止（.github/workflows/review-status.yml / claude-review-response.yml）。
- name: "ai:review-wait"
  color: "fbca04"
  description: "レビュー待ち（Codex/人間のレビュー投稿で自動除去）"
- name: "ai:review-responding"
  color: "8a63d2"
  description: "Claude がレビュー指摘に対応中（対応ジョブの実行中に付く可視化用）"
- name: "ai:review-done"
  color: "0e8a16"
  description: "AI レビューのやり取りが収束。人間が確認可能（新たな更新で自動除去）"

# ── メタ（接頭辞なし） ───────────────────────────────────────
- name: "epic"
  color: "3e4b9e"
  description: "複数 issue を束ねる大型タスク"
- name: "discussion"
  color: "d876e3"
  description: "議論・要相談"
- name: "hackathon"
  color: "c2e0c6"
  description: "ハッカソン関連"

# ── dependabot 管理（自動付与。触らない） ───────────────────
- name: "dependencies"
  color: "0366d6"
  description: "依存更新（dependabot）"
- name: "github_actions"
  color: "000000"
  description: "GitHub Actions 依存（dependabot）"
- name: "docker"
  color: "21ceff"
  description: "Docker 依存（dependabot）"
- name: "python"
  color: "2b67c6"
  description: "Python 依存（dependabot）"
- name: "javascript"
  color: "168700"
  description: "JavaScript 依存（dependabot）"
