name: Sync labels

# .github/labels.yml を単一の真実としてリポジトリのラベルを同期する（IaC）。
# manifest に無いラベルは削除される（skip-delete: false）。dependabot 管理ラベルも
# manifest に含めているため消えない。手動編集は drift するので禁止（manifest を編集する）。
on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
      - ".github/workflows/labels.yml"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "適用せず差分のみ表示する"
        type: boolean
        default: true

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: crazy-max/ghaction-github-labeler@548a7c3603594ec17c819e1239f281a3b801ab4d # v6.0.0
        with:
          yaml-file: .github/labels.yml
          skip-delete: false
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run }}
