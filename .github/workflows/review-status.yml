name: Review status (label)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write

concurrency:
  group: review-status-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Sync review-wait label
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event.pull_request.head.repo.fork == false &&
        github.event.pull_request.draft == false
      }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
    steps:
      - name: Add review-wait on PR update
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          gh pr edit "$PR" --remove-label "ai:review-done" || true
          if gh pr view "$PR" --json labels --jq '.labels[].name' | grep -qx "needs-human"; then
            echo "::notice::needs-human のため review-wait は付けません。"
          else
            gh pr edit "$PR" --add-label "ai:review-wait" || true
          fi

      - name: Remove review-wait on review submitted
        if: >-
          ${{
            github.event_name == 'pull_request_review' &&
            github.event.review.state != 'approved' &&
            github.event.review.user.login != 'claude' &&
            github.event.review.user.login != 'claude[bot]' &&
            (
              github.event.review.user.login == 'chatgpt-codex-connector[bot]' ||
              (
                github.event.review.user.type != 'Bot' &&
                contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association)
              )
            )
          }}
        run: gh pr edit "$PR" --remove-label "ai:review-wait" --remove-label "ai:review-done" || true
