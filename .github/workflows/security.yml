name: Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Dependency vulnerability audit. Advisory at first (non-blocking) so transitive
  # CVEs we can't immediately fix don't wall off the PR; tighten to blocking later.
  python-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 共有ドメイン層 (sanba_shared) も独自依存 (google-cloud-firestore 等) を持つため監査対象。
        dir: [apps/agent, apps/api, packages/sanba_shared]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv python install 3.12
      - run: uv sync --all-extras --dev
      - name: pip-audit
        continue-on-error: true
        run: uv run --with pip-audit pip-audit

  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - run: npm install --package-lock-only
      - name: npm audit
        continue-on-error: true
        run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Run the gitleaks binary directly (the v2 action needs a license on private
      # org repos); scans the working tree against our allowlisted config.
      - name: Install gitleaks
        run: |
          VERSION=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Scan working tree
        run: gitleaks detect --no-git --source . --config .gitleaks.toml --redact --verbose

  image-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [agent, api, web]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build image
        # agent/api は共有パッケージを同梱するため context=リポジトリ直下 (ADR-0014 §9)。
        # web は従来どおり apps/web を context にする。
        run: |
          if [ "${{ matrix.app }}" = "web" ]; then
            docker build -t sanba-${{ matrix.app }}:scan apps/web
          else
            docker build -t sanba-${{ matrix.app }}:scan -f apps/${{ matrix.app }}/Dockerfile .
          fi
      # Trivy is advisory: the docker build above is the gate. Install + scan are
      # both continue-on-error so a flaky install/scan never blocks the PR.
      - name: Install Trivy
        continue-on-error: true
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin v0.55.0
      - name: Trivy scan
        continue-on-error: true
        run: trivy image --severity HIGH,CRITICAL --format table sanba-${{ matrix.app }}:scan || true
