name: Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Dependency vulnerability audit. Blocking gate: pip-audit fails the job when a
  # known advisory is present (HIGH/CRITICAL の既知 CVE を含む依存追加をマージ前に止める)。
  python-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 共有ドメイン層 (sanba_shared) も独自依存 (google-cloud-firestore 等) を持つため監査対象。
        dir: [apps/agent, apps/api, packages/sanba_shared, external-agents]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      - run: uv python install 3.12
      - run: uv sync --all-extras --dev
      - name: pip-audit
        run: uv run --with pip-audit pip-audit

  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Run the gitleaks binary directly (the v2 action needs a license on private
      # org repos); scans the working tree against our allowlisted config.
      # バージョン固定 + 公式 checksums.txt 照合で入れる (terraform.yml と同方針・改ざん検知)。
      - name: Install gitleaks (pinned + checksum)
        working-directory: /tmp
        run: |
          set -euo pipefail
          VERSION=8.18.4
          base="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}"
          curl -sSfL -O "${base}/gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -sSfL -O "${base}/gitleaks_${VERSION}_checksums.txt"
          sha256sum --ignore-missing -c "gitleaks_${VERSION}_checksums.txt"
          sudo tar -xzf "gitleaks_${VERSION}_linux_x64.tar.gz" -C /usr/local/bin gitleaks
      - name: Scan working tree
        run: gitleaks detect --no-git --source . --config .gitleaks.toml --redact --verbose

  image-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [agent, api, web, worker]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build image
        # agent/api は共有パッケージを同梱するため context=リポジトリ直下 (ADR-0014 §9)。
        # web は従来どおり apps/web を context にする。
        run: |
          if [ "${{ matrix.app }}" = "web" ]; then
            docker build -t sanba-${{ matrix.app }}:scan apps/web
          else
            docker build -t sanba-${{ matrix.app }}:scan -f apps/${{ matrix.app }}/Dockerfile .
          fi
      # Trivy はブロッキングゲート: HIGH/CRITICAL を検出したら --exit-code 1 で job を落とす。
      # install スクリプトを `| sudo sh` で直接実行せず、ファイルに落として sha256 を
      # 照合してから実行する。tag は mutable なため tag 差し替え・配信経路の改ざんがあると
      # sha256 が一致せず set -e で実行前に止まる。
      # 固定したスクリプト自身も trivy バイナリを checksums.txt で sha256 照合する (二段の供給網対策)。
      - name: Install Trivy (script sha256-verified)
        run: |
          set -euo pipefail
          SCRIPT_SHA256=2304dcc0c1883e802d376eae1b514c923b7427a7d88091dfcaf83967e6f55a7c
          curl -sSfL -o /tmp/trivy-install.sh \
            https://raw.githubusercontent.com/aquasecurity/trivy/v0.55.0/contrib/install.sh
          echo "${SCRIPT_SHA256}  /tmp/trivy-install.sh" | sha256sum -c -
          sudo sh /tmp/trivy-install.sh -b /usr/local/bin v0.55.0
      - name: Trivy scan
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --format table sanba-${{ matrix.app }}:scan
