name: Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [apps/agent, apps/api, packages/sanba_shared, external-agents, a2a-facade]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv python install 3.12
      - run: uv sync --all-extras --dev
      - name: pip-audit
        run: uv run --with pip-audit pip-audit

  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install gitleaks (pinned + checksum)
        working-directory: /tmp
        run: |
          set -euo pipefail
          VERSION=8.18.4
          base="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}"
          curl -sSfL -O "${base}/gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -sSfL -O "${base}/gitleaks_${VERSION}_checksums.txt"
          sha256sum --ignore-missing -c "gitleaks_${VERSION}_checksums.txt"
          sudo tar -xzf "gitleaks_${VERSION}_linux_x64.tar.gz" -C /usr/local/bin gitleaks
      - name: Scan working tree
        run: gitleaks detect --no-git --source . --config .gitleaks.toml --redact --verbose

  image-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: agent
            context: .
            file: apps/agent/Dockerfile
          - app: api
            context: .
            file: apps/api/Dockerfile
          - app: web
            context: apps/web
            file: apps/web/Dockerfile
          - app: worker
            context: .
            file: apps/worker/Dockerfile
          - app: a2a-facade
            context: .
            file: a2a-facade/Dockerfile
          - app: holmes-sidecar
            context: .
            file: a2a-facade/sidecar/Dockerfile
          - app: gcp-obs-mcp
            context: .
            file: a2a-facade/mcp/gcp-observability/Dockerfile
          - app: firestore-mcp
            context: .
            file: a2a-facade/mcp/firestore/Dockerfile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build image
        run: DOCKER_BUILDKIT=1 docker build -t sanba-${{ matrix.app }}:scan -f ${{ matrix.file }} ${{ matrix.context }}
      - name: Trivy scan
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy@sha256:35e972d4c97895711cb2de6594cc1774b61e6b9dc7661ef73a76dd649f006c8d \
            image --ignore-unfixed --exit-code 1 --severity HIGH,CRITICAL --format table \
            sanba-${{ matrix.app }}:scan
