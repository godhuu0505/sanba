name: LLM Eval (LLMOps)

on:
  pull_request:
    paths:
      - "apps/agent/src/sanba_agent/prompts/**"
      - "apps/agent/src/sanba_agent/agent_team.py"
      - "apps/agent/src/sanba_agent/tools/**"
      - "apps/agent/src/sanba_agent/evaluation.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv python install 3.12
      - run: uv sync --all-extras --dev
      - run: uv run python -m sanba_agent.evaluation
