name: LLM Eval (LLMOps)

on:
  pull_request:
    paths:
      - "apps/agent/src/sanba_agent/prompts/**"
      - "apps/agent/src/sanba_agent/agent_team.py"
      - "apps/agent/src/sanba_agent/tools/**"
      - "apps/agent/src/sanba_agent/evaluation.py"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: auth
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.EVAL_SA }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv python install 3.12
      - run: uv sync --all-extras --dev
      - run: uv run python -m sanba_agent.evaluation
        env:
          GOOGLE_GENAI_USE_VERTEXAI: ${{ steps.auth.outcome == 'success' && 'true' || 'false' }}
          GOOGLE_CLOUD_PROJECT: ${{ vars.GCP_PROJECT_ID }}
          GOOGLE_CLOUD_LOCATION: ${{ vars.GCP_REGION }}
