name: Terraform (infra)

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "plan か apply を選択 (mobile から)。apply は本番反映。"
        type: choice
        default: plan
        options: [plan, apply]
  workflow_call:
    inputs:
      action:
        description: "plan か apply。apply は本番反映。"
        type: string
        default: plan

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  WORKDIR: infra/terraform

jobs:
  terraform:
    runs-on: ubuntu-latest
    if: >-
      ${{ vars.GCP_PROJECT_ID != '' &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.fork == false) }}
    environment: ${{ inputs.action == 'apply' && 'production' || '' }}
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    env:
      TF_VAR_project_id:                  ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_region:                      ${{ vars.GCP_REGION || 'us-central1' }}
      TF_VAR_billing_account:             ${{ vars.BILLING_ACCOUNT }}
      TF_VAR_enable_billing_export:       ${{ vars.ENABLE_BILLING_EXPORT || 'false' }}
      TF_VAR_separate_stt_enabled:        ${{ vars.SEPARATE_STT_ENABLED || 'false' }}
      TF_VAR_domain:                      ${{ vars.PROD_DOMAIN }}
      TF_VAR_web_subdomain:               ${{ vars.PROD_WEB_SUBDOMAIN }}
      TF_VAR_dns_managed_zone_name:       ${{ vars.PROD_DNS_ZONE_NAME || 'sanba' }}
      TF_VAR_dns_dnssec_state:            ${{ vars.PROD_DNS_DNSSEC_STATE }}
      TF_VAR_livekit_url:                 ${{ vars.LIVEKIT_URL }}
      TF_VAR_google_oauth_client_id:      ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      TF_VAR_deploy_sa:                   ${{ vars.DEPLOY_SA }}
      TF_VAR_elasticsearch_url:           ${{ vars.ELASTICSEARCH_URL }}
      TF_VAR_otel_exporter_otlp_endpoint: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
      TF_VAR_active_app_secret_ids:       ${{ vars.ACTIVE_APP_SECRET_IDS || '[]' }}
      TF_VAR_github_app_enabled:          ${{ vars.GH_APP_ENABLED || 'false' }}
      TF_VAR_github_app_id:               ${{ vars.GH_APP_ID }}
      TF_VAR_github_app_slug:             ${{ vars.GH_APP_SLUG }}
      TF_VAR_github_app_client_id:        ${{ vars.GH_APP_CLIENT_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_DEPLOY_SA || vars.DEPLOY_SA }}

      - name: Install Terraform (pinned + checksum)
        working-directory: /tmp
        run: |
          set -euo pipefail
          base="https://releases.hashicorp.com/terraform/${TF_VERSION}"
          curl -fsSLO "${base}/terraform_${TF_VERSION}_linux_amd64.zip"
          curl -fsSLO "${base}/terraform_${TF_VERSION}_SHA256SUMS"
          sha256sum --ignore-missing -c "terraform_${TF_VERSION}_SHA256SUMS"
          unzip -o "terraform_${TF_VERSION}_linux_amd64.zip"
          sudo mv terraform /usr/local/bin/terraform
          terraform version

      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state"

      - name: Terraform Format Check
        continue-on-error: true
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        continue-on-error: true
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan_log.txt

      - name: Render plan comment (diff only)
        if: ${{ always() && github.event_name == 'pull_request' }}
        run: |
          if [ -f tfplan ]; then
            terraform show -no-color tfplan > plan.txt
          else
            tail -c 20000 plan_log.txt > plan.txt
          fi

      - name: Comment plan on PR (update in place)
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          marker="<!-- terraform-plan-comment -->"
          {
            echo "$marker"
            echo "#### Terraform Plan (\`${WORKDIR}\`) — ${{ steps.plan.outcome }}"
            echo
            echo '```hcl'
            tail -c 60000 plan.txt
            echo '```'
          } > body.md
          cid=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" \
            --jq "map(select(.body | contains(\"${marker}\"))) | last | .id // empty")
          if [ -n "$cid" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${cid}" -F body=@body.md >/dev/null
            echo "updated existing plan comment: $cid"
          else
            gh pr comment "$PR" --body-file body.md
            echo "created new plan comment"
          fi

      - name: Fail if plan failed
        if: ${{ steps.plan.outcome == 'failure' }}
        run: |
          echo "::error::terraform plan が失敗しました。上のログ/PRコメントを確認してください。"
          exit 1

      - name: Terraform Apply
        if: ${{ inputs.action == 'apply' }}
        run: terraform apply -input=false -auto-approve tfplan
