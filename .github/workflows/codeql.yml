name: CodeQL

# NOTE: Code scanning is enabled for this (public) repo, so the SARIF upload
# succeeds and this workflow is gating: a failed init/analyze/upload turns CI red.
# If Code scanning is ever disabled, the upload step will error and block merges —
# re-enable it (or restore continue-on-error) before that happens.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"  # weekly

# 既定 GITHUB_TOKEN を read-only 運用するための明示宣言 (top-level)。
# 解析ジョブは job 配下で security-events: write 等に昇格する (下記)。
permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: /language:${{ matrix.language }}
