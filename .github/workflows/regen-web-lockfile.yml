name: regen-web-lockfile

# eslint ^9.39.4 への据え置きに合わせて apps/web/package-lock.json を
# サーバ側で再生成し、ブランチへコミットするための一時ヘルパ。
# 役目を終えたら削除する。
on:
  push:
    branches: [feature/dependabot-schedule-update]
    paths:
      - .github/workflows/regen-web-lockfile.yml

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feature/dependabot-schedule-update
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Regenerate lockfile
        working-directory: apps/web
        run: npm install
      - name: Commit lockfile if changed
        run: |
          if git diff --quiet -- apps/web/package-lock.json; then
            echo "package-lock.json は既に整合済み。何もしない。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/package-lock.json
          git commit -m "chore(web): regenerate package-lock.json to match eslint 9 pin"
          git push origin HEAD:feature/dependabot-schedule-update
