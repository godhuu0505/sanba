name: Deploy (Cloud Run)

# main へのマージで Cloud Run にデプロイ。鍵レス認証は Workload Identity Federation。
#
# コスト最適化:
#   - 変更のあった app だけビルド & デプロイ (paths-filter) → Actions 分・AR ストレージ節約。
#   - Buildx の GHA キャッシュでビルド時間短縮。
#   - 古い実行は concurrency でキャンセル。
#   - env/secret/スケールは Terraform が一度だけ設定。ここは画像の差し替えのみ
#     (gcloud run deploy --image は既存の env/secret 設定を保持する)。
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGION: us-central1
  REPO: sanba

permissions:
  contents: read
  id-token: write # Workload Identity Federation

jobs:
  # 変更のあった app を検出する。app コード・Dockerfile が変わったものだけ後段で回す。
  changes:
    runs-on: ubuntu-latest
    if: ${{ vars.GCP_PROJECT_ID != '' }}
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            agent: ['apps/agent/**']
            api: ['apps/api/**']
            web: ['apps/web/**']

  deploy:
    needs: changes
    if: ${{ needs.changes.outputs.apps != '[]' && needs.changes.outputs.apps != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v4

      - name: Build & push (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          # web はブラウザから見た API URL をビルド時に焼き込む (任意の repo 変数で上書き)。
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_LIVEKIT_URL=${{ vars.NEXT_PUBLIC_LIVEKIT_URL }}

      - name: Deploy to Cloud Run (image only; env/secret は Terraform 管理)
        run: |
          gcloud run deploy sanba-${{ matrix.app }} \
            --image "${REGION}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${REPO}/${{ matrix.app }}:${GITHUB_SHA}" \
            --region "$REGION" \
            --quiet
