name: Deploy (Cloud Run)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      apps:
        description: "デプロイ対象 (mobile から選択)"
        type: choice
        default: all
        options: [all, web, api, agent, worker]
      reason:
        description: "デプロイ理由 (任意・監査ログ用)"
        type: string
        required: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGION: us-central1
  REPO: sanba

permissions:
  contents: read
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    if: ${{ vars.GCP_PROJECT_ID != '' }}
    outputs:
      apps: ${{ steps.decide.outputs.apps }}
      infra: ${{ steps.decide.outputs.infra }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            agent: ['apps/agent/**', 'packages/sanba_shared/**']
            api: ['apps/api/**', 'packages/sanba_shared/**']
            web: ['apps/web/**']
            worker: ['apps/worker/**', 'packages/sanba_shared/**']
            infra: ['infra/terraform/**', '.github/workflows/terraform.yml']
      - id: decide
        env:
          APPS_INPUT: ${{ github.event.inputs.apps }}
          REASON: ${{ github.event.inputs.reason }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APPS_INPUT="${APPS_INPUT:-all}"
            echo "### 手動デプロイ" >> "$GITHUB_STEP_SUMMARY"
            echo "- apps: \`${APPS_INPUT}\` / reason: ${REASON:-<none>} / actor: ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
            case "$APPS_INPUT" in
              all)                  echo 'apps=["agent","api","web","worker"]' >> "$GITHUB_OUTPUT" ;;
              web|api|agent|worker) echo "apps=[\"${APPS_INPUT}\"]" >> "$GITHUB_OUTPUT" ;;
              *)                    echo "::error::invalid apps input: ${APPS_INPUT}" >&2; exit 1 ;;
            esac
            echo 'infra=false' >> "$GITHUB_OUTPUT"
          else
            echo 'apps='"$(echo '${{ steps.filter.outputs.changes }}' | jq -c 'map(select(. != "infra"))')" >> "$GITHUB_OUTPUT"
            echo 'infra=${{ steps.filter.outputs.infra }}' >> "$GITHUB_OUTPUT"
          fi

  migrate:
    needs: changes
    if: ${{ needs.changes.outputs.infra == 'true' }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    concurrency:
      group: terraform-${{ github.ref }}
      cancel-in-progress: false
    uses: ./.github/workflows/terraform.yml
    with:
      action: apply

  deploy:
    needs: [changes, migrate]
    if: >-
      ${{ !cancelled() &&
          (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') &&
          needs.changes.outputs.apps != '[]' && needs.changes.outputs.apps != '' }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Require web build config
        if: ${{ matrix.app == 'web' }}
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
        run: |
          missing=0
          for v in NEXT_PUBLIC_API_URL NEXT_PUBLIC_GOOGLE_CLIENT_ID; do
            if [ -z "${!v}" ]; then
              echo "::error::vars.${v} が未設定です (web ビルドに必須・空だと本番が壊れる)" >&2
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Fetch Picker API key from Secret Manager (web)
        id: picker_key
        if: ${{ matrix.app == 'web' }}
        run: |
          key="$(gcloud secrets versions access latest \
            --secret=sanba-next-public-google-api-key \
            --project="${{ vars.GCP_PROJECT_ID }}" 2>/dev/null || true)"
          if [ -n "$key" ]; then echo "::add-mask::$key"; fi
          echo "value=$key" >> "$GITHUB_OUTPUT"

      - name: Build & push (with layer cache)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.app == 'web' && 'apps/web' || '.' }}
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            ${{ vars.NEXT_PUBLIC_API_URL != '' && format('NEXT_PUBLIC_API_URL={0}', vars.NEXT_PUBLIC_API_URL) || '' }}
            ${{ vars.NEXT_PUBLIC_LIVEKIT_URL != '' && format('NEXT_PUBLIC_LIVEKIT_URL={0}', vars.NEXT_PUBLIC_LIVEKIT_URL) || '' }}
            ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID != '' && format('NEXT_PUBLIC_GOOGLE_CLIENT_ID={0}', vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID) || '' }}
            ${{ steps.picker_key.outputs.value != '' && format('NEXT_PUBLIC_GOOGLE_API_KEY={0}', steps.picker_key.outputs.value) || '' }}

      - name: Deploy to Cloud Run (image only; env/secret は Terraform 管理)
        run: |
          if ! gcloud run services describe "sanba-${{ matrix.app }}" \
              --region "$REGION" --format='value(name)' >/dev/null 2>&1; then
            echo "::notice::Cloud Run サービス sanba-${{ matrix.app }} は未プロビジョニングのため deploy をスキップします (イメージは push 済み。有効化は enable-video-analysis runbook を参照)"
            exit 0
          fi
          gcloud run deploy sanba-${{ matrix.app }} \
            --image "${REGION}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${REPO}/${{ matrix.app }}:${GITHUB_SHA}" \
            --region "$REGION" \
            --quiet

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ matrix.app }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: false

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ matrix.app }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.app }}.cdx.json
          upload-artifact: false

      - name: Attest SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ matrix.app }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom-${{ matrix.app }}.cdx.json
          push-to-registry: false
