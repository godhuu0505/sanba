name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一ブランチの古い実行はキャンセルして Actions 分を節約する (コスト最適化)。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 最小権限。CI はチェックアウトと読み取りのみで足りる (public 化に伴う既定権限の明示)。
permissions:
  contents: read

jobs:
  agent:
    name: agent (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - run: uv python install 3.13
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run pytest -q

  api:
    name: api (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - run: uv python install 3.13
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run pytest -q

  four-keys:
    name: four-keys (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/four-keys/collector
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - run: uv python install 3.12
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run pytest -q

  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - run: npm install
      - run: npm run typecheck
      - run: npm run build

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: [agent, api, web]
    strategy:
      matrix:
        app: [agent, api, web]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: apps/${{ matrix.app }}
          push: false
          # scope を app 単位で分け、deploy.yml のキャッシュと共有する。
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
