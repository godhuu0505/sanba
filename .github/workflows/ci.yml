name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一ブランチの古い実行はキャンセルして Actions 分を節約する (コスト最適化)。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 最小権限。CI はチェックアウトと読み取りのみで足りる (public 化に伴う既定権限の明示)。
permissions:
  contents: read

jobs:
  shared:
    name: shared (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sanba_shared
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - run: uv python install 3.13
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run mypy src # 型を quality-gate に実在させる (#58)
      - run: uv run pytest -q

  agent:
    name: agent (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - run: uv python install 3.13
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run mypy src # 型を quality-gate に実在させる (#58)
      - run: uv run pytest -q

  api:
    name: api (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - run: uv python install 3.13
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run mypy src # 型を quality-gate に実在させる (#58)
      - run: uv run pytest -q

  worker:
    name: worker (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - run: uv python install 3.13
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run mypy src # 型を quality-gate に実在させる (#58)
      - run: uv run pytest -q

  four-keys:
    name: four-keys (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/four-keys/collector
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - run: uv python install 3.12
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run mypy src # 型を quality-gate に実在させる (#58)
      - run: uv run pytest -q

  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: [shared, agent, api, web]
    strategy:
      matrix:
        # agent/api は共有パッケージを同梱するため context=リポジトリ直下 (ADR-0014 §9)。
        # web は共有パッケージ不要なので従来どおり apps/web を context にする。
        include:
          - app: agent
            context: .
            file: apps/agent/Dockerfile
          - app: api
            context: .
            file: apps/api/Dockerfile
          - app: web
            context: apps/web
            file: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          # scope を app 単位で分け、deploy.yml のキャッシュと共有する。
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # ループ終端条件「mergeable」を 1 つの必須チェックに集約する (#58 / ADR-0011 §2)。
  # branch protection (#62) はこの quality-gate だけを必須にすればよく、構成が単純になる。
  # docker は重いため集約対象外 (web の npm run build で build は担保済み)。
  quality-gate:
    name: quality-gate
    needs: [shared, agent, api, four-keys, web]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs passed
        # 失敗・キャンセル・スキップのいずれかがあれば緑にしない。
        # skipped も失敗扱い (path フィルタ等で必須ジョブが化けて緑になるのを防ぐ保険)。
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" = "true" ]; then
            echo "::error::必須ジョブが失敗/キャンセル/スキップされました"
            exit 1
          fi
          echo "全必須ジョブ (shared/agent/api/four-keys/web) が成功"
