name: release-please

# main への push を Conventional Commits で解析し、リリース用 PR
# (CHANGELOG / manifest / tag / GitHub Release) を自動生成・更新する。
# 実際のリリースはそのPRを人間がレビュー・マージした時点で確定する
# （branch protection のレビュー必須ルールがそのまま release ゲートを兼ねる）。
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
