version: 2
updates:
  - package-ecosystem: pip
    directory: /apps/agent
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    groups:
      npm-deps:
        patterns: ["*"]
    ignore:
      # ESLint 10 は eslint-config-next が依存する typescript-eslint v8 系と非互換
      # （scopeManager.addGlobals 未実装でクラッシュ）。対応版リリース後に手動で更新する。
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directories:
      - /apps/agent
      - /apps/api
      - /apps/web
      - /infra/four-keys/collector
    schedule:
      interval: weekly
