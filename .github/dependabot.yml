version: 2
updates:
  - package-ecosystem: pip
    directory: /apps/agent
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /external-agents
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  # typescript 7（Go ネイティブ実装）は typescript-eslint（peer: <6.1.0）と
  # Next.js 16 の build worker が未対応で CI が落ちるため、対応が揃うまで
  # major 更新を ignore する（PR #485 の失敗要因）。
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    groups:
      npm-deps:
        patterns: ["*"]
    ignore:
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  # Dependabot docker は Dockerfile の FROM のみ更新する。docker-compose.yml /
  # docker-compose.tools.yml の image: は対象外なので、それらは固定バージョンタグ
  # （＋可能ならダイジェスト）で手動ピンして供給網リスクを抑える（SEC-047）。
  - package-ecosystem: docker
    directories:
      - /apps/agent
      - /apps/api
      - /apps/web
      - /infra/four-keys/collector
    schedule:
      interval: weekly
