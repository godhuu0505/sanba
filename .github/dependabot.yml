version: 2
updates:
  - package-ecosystem: pip
    directory: /apps/agent
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /external-agents
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    groups:
      npm-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  # Dependabot docker は Dockerfile の FROM のみ更新する。docker-compose.yml /
  # docker-compose.tools.yml の image: は対象外なので、それらは固定バージョンタグ
  # （＋可能ならダイジェスト）で手動ピンして供給網リスクを抑える（SEC-047）。
  - package-ecosystem: docker
    directories:
      - /apps/agent
      - /apps/api
      - /apps/web
      - /infra/four-keys/collector
    schedule:
      interval: weekly
