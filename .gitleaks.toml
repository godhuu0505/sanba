# gitleaks configuration for SANBA.
# Extends the default ruleset; allowlists local-dev placeholder secrets so the
# scan stays green while still catching real leaked credentials.
title = "SANBA gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Local-dev placeholders (no real secrets)."
# .env.example は値が全てプレースホルダの配布テンプレートなのでファイル単位で許可する。
# docker-compose.yml は運用ファイルなので丸ごと許可はせず、既知の dev クレデンシャル行だけを
# 値ベースで許可する。これにより将来 docker-compose.yml に混入する本物の秘密は検出できる。
paths = [
  '''\.env\.example''',
]
regexes = [
  # 意図的にコミットしている既知の dev プレースホルダ値だけをピンポイントで許可する
  # （広域一致の `devkey` 単独は使わない）。
  '''dev-only-insecure-secret-change-me''',
  '''LIVEKIT_KEYS:\s*"devkey:\s*secret"''',
]
