global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: sanba-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: four-keys
    metrics_path: /metrics
    scrape_interval: 60s
    static_configs:
      - targets: ["four-keys:9301"]
