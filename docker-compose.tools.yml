services:
  agent:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started

  api:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/observability/otel/config.yaml:/etc/otel/config.yaml:ro
    ports: ["4317:4317", "4318:4318"]
    depends_on: [prometheus, loki, tempo]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.3
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./infra/observability/loki/config.yaml:/etc/loki/config.yaml:ro
    ports: ["3100:3100"]
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.10.7
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./infra/observability/tempo/config.yaml:/etc/tempo/config.yaml:ro
    ports: ["3200:3200"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.16
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "false"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports: ["127.0.0.1:3001:3000"]
    depends_on: [prometheus, loki, tempo]
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports: ["5601:5601"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  four-keys:
    build: ./infra/four-keys/collector
    environment:
      GITHUB_REPOSITORY: "${GITHUB_REPOSITORY:-godhuu0505/sanba}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
    command: ["serve", "--port", "9301", "--window-days", "30"]
    ports: ["9301:9301"]
    restart: unless-stopped
